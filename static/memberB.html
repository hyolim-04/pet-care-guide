<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌾 맞춤 사료 추천 — Pet Care Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .badge-type { border-radius: 10px; padding: 4px 10px; font-size: 0.76rem; font-weight: 700; display: inline-block; }
    .dog-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 50px;
      border: 2px solid #dee2e6; background: white;
      cursor: pointer; font-weight: 700; font-size: 0.88rem;
      transition: all 0.2s; margin: 4px;
    }
    .dog-chip.selected { border-color: #198754; background: #e8f5e9; color: #198754; }
    .dog-chip:hover { border-color: #20c997; }
    .project-card { border-radius: 16px; border: 1px solid #e9ecef; }
    .page-link { color: #198754; }
    .page-item.active .page-link { background-color: #198754; border-color: #198754; color: white; }
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom sticky-top mb-4" style="height:70px;">
    <div class="container-fluid px-4">
      <a class="navbar-brand fs-4 fw-bold text-success text-decoration-none" href="/">🌿 Pet Care Guide</a>
      <a href="/memberA" class="btn btn-sm btn-outline-secondary">← 체형 분석으로</a>
    </div>
  </nav>

  <div id="no-profile-alert" class="container d-none p-4 rounded mb-4" style="border-left:4px solid #ffc107;background:#fff3cd;color:#664d03;">
    💡 모듈 A에서 강아지를 먼저 등록해주세요.
    <a href="/memberA" class="btn btn-sm ms-3" style="background:#198754;color:white;border:none;">모듈 A로 이동</a>
  </div>

  <div id="main-content" class="d-none">

    <div class="card p-4 mb-4 mx-3 project-card">
      <h5 class="mb-3">🐶 강아지 선택</h5>
      <div id="dog-chips"><span class="text-muted" style="font-size:0.87rem;">불러오는 중...</span></div>
    </div>

    <div class="container py-2">
      <div class="row justify-content-center">
        <div class="col-12">
          
          <div id="profile-section" class="d-none card project-card p-4 mb-4">
            <h5 class="mb-3">📋 강아지 프로필</h5>
            <div id="profile-display" class="mb-4"></div>
            <div class="text-end">
              <button class="btn" style="background:#198754;color:white;border-radius:8px;padding:10px 20px;font-weight:bold;" onclick="exploreFood()">
                🔍 맞춤 사료 탐색
              </button>
            </div>
          </div>

          <div id="result-section" class="d-none">
            <div id="hash-card" class="card p-4 mb-4" style="border-radius:16px;border-left:5px solid #20c997;border-top:1px solid #e9ecef;border-right:1px solid #e9ecef;border-bottom:1px solid #e9ecef;">
              <div class="d-flex align-items-center gap-3 flex-wrap">
                <span style="font-size:2rem;">⚡</span>
                <div>
                  <div class="fw-bold text-success fs-6">해시맵 탐색 완료!</div>
                  <div class="text-muted small" id="hash-desc"></div>
                </div>
              </div>
            </div>

            <div id="obese-alert" class="d-none card p-3 mb-4" style="border-radius:16px;border-left:5px solid #e74c3c;border-top:1px solid #e9ecef;border-right:1px solid #e9ecef;border-bottom:1px solid #e9ecef;">
              <span class="fw-bold" style="color:#e74c3c;">⚠️ 비만 판정</span>
              <span class="text-muted ms-2 small">해당 사이즈 기준 초과 체중 감지 — 다이어트 사료에 가산점이 자동 적용되었습니다.</span>
            </div>

            <div id="underweight-alert" class="d-none card p-3 mb-4" style="border-radius:16px;border-left:5px solid #0d6efd;border-top:1px solid #e9ecef;border-right:1px solid #e9ecef;border-bottom:1px solid #e9ecef;">
              <span class="fw-bold" style="color:#0d6efd;">⚠️ 저체중 판정</span>
              <span class="text-muted ms-2 small">해당 사이즈 기준 미달 체중 감지 — 고단백 영양 보충 사료에 가산점이 자동 적용되었습니다.</span>
            </div>

            <div class="card project-card p-4">
              <h4 class="text-success mb-4" id="top3-title">🏆 맞춤 사료 TOP 3</h4>
              <div id="top3-list"></div>
            </div>

            <div class="card project-card p-4 mt-4" id="all-list-card">
              <h5 class="text-secondary mb-3">📋 전체 사료 적합도 랭킹</h5>
              <div id="all-foods-list"></div>
              
              <nav aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center" id="pagination-controls">
                </ul>
              </nav>
            </div>

          </div>

        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = ''; 
    const rankEmoji = ["🥇","🥈","🥉"];
    const proteinLabel = { high:"고단백", low:"저단백", normal:"일반" };
    const sizeKr = { small:"소형", medium:"중형", large:"대형" };
    const sizeLabel = { small:"소형견", medium:"중형견", large:"대형견" };
    const actLabel  = { low:"낮음", medium:"보통", high:"높음" };

    let dogsList = [];
    let selectedDogId = null;
    let currentRecData = null;
    
    // 페이징 전역 변수
    let allSortedFoods = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    window.onload = async function() {
      try {
        const res = await fetch(API + '/api/dogs');
        dogsList = await res.json();
      } catch (e) {
        console.error("강아지 목록을 불러오지 못했습니다.", e);
      }

      if (!dogsList || dogsList.length === 0) {
        document.getElementById('no-profile-alert').classList.remove('d-none');
        return;
      }

      document.getElementById('main-content').classList.remove('d-none');
      renderDogChips();

      const raw = localStorage.getItem('module1_profile');
      if (raw) {
        const p = JSON.parse(raw);
        if (dogsList.find(d => d.id === p.dog_id)) selectDog(p.dog_id);
      }
    };

    function renderDogChips() {
      const wrap = document.getElementById('dog-chips');
      wrap.innerHTML = dogsList.map(d => `
        <button class="dog-chip ${d.id === selectedDogId ? 'selected' : ''}" onclick="selectDog(${d.id})">
          🐾 ${d.name}
          <span style="font-weight:400;color:#888;font-size:0.8rem;">${d.breed}</span>
        </button>`).join('');
    }

    async function selectDog(id) {
      selectedDogId = id;
      renderDogChips();
      
      document.getElementById('result-section').classList.add('d-none');
      document.getElementById('obese-alert').classList.add('d-none');
      document.getElementById('underweight-alert').classList.add('d-none');
      currentRecData = null;

      const res = await fetch(API + '/api/recommend/' + id);
      if (!res.ok) {
        alert("데이터를 불러오는데 실패했습니다.");
        return;
      }
      const data = await res.json();
      currentRecData = data; 

      const p = data.profile;
      document.getElementById('profile-section').classList.remove('d-none');
      
      document.getElementById('profile-display').innerHTML = `
        <div class="row text-center fw-bold bg-light p-3 rounded">
          <div class="col"><span class="text-muted d-block small mb-1">이름</span>${p.name}</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">품종</span>${p.breed}</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">나이</span>${p.age}세</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">체중</span>${p.weight}kg</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">크기</span>${sizeLabel[p.size]||p.size}</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">활동량</span>${actLabel[p.activity]||p.activity}</div>
          <div class="col border-start"><span class="text-muted d-block small mb-1">기저질환</span>${p.conditions.join(', ')}</div>
        </div>`;
    }

    function exploreFood() {
      if (!currentRecData) return;
      const data = currentRecData;

      document.getElementById('result-section').classList.remove('d-none');

      document.getElementById('hash-desc').innerHTML =
        `전체 사료 <strong>${data.total_count}개</strong> 중, <strong>${sizeKr[data.profile.size]||data.profile.size} 사이즈 강아지</strong> 버킷에서 <strong>${data.bucket_count}개</strong>만 즉시 추출했습니다.`;

      if (data.profile.is_obese) document.getElementById('obese-alert').classList.remove('d-none');
      else document.getElementById('obese-alert').classList.add('d-none');

      if (data.profile.is_underweight) document.getElementById('underweight-alert').classList.remove('d-none');
      else document.getElementById('underweight-alert').classList.add('d-none');

      document.getElementById('top3-title').textContent = `🏆 ${data.profile.name} 맞춤 사료 TOP 3`;

      // 전체 데이터 할당
      allSortedFoods = data.all_sorted || data.top3; 

      if (!allSortedFoods.length) {
        document.getElementById('top3-list').innerHTML = `<div class="text-center text-muted py-4">😢 해당 조건에 맞는 사료를 찾지 못했습니다.</div>`;
        document.getElementById('all-list-card').classList.add('d-none');
        return;
      }

      // 가격 점수 자동 계산 보정
      allSortedFoods.forEach(food => {
        const hasPrice = food.reasons && food.reasons.some(r => r['사유'].includes('가격') || r['사유'].includes('가성비'));
        if (!hasPrice) {
          let pScore = 40 - Math.floor(food.price / 1500);
          if (pScore < 10) pScore = 10;
          if (pScore > 35) pScore = 35;

          if (!food.reasons) food.reasons = [];
          food.reasons.push({ "사유": "가성비 (가격 만족도)", "점수": pScore });
          food.score += pScore; 
        }
      });

      // 프론트엔드에서 다시 정렬 (내림차순, 동점시 가격순)
      allSortedFoods.sort((a, b) => b.score - a.score || a.price - b.price);

      // Top 3 뽑기
      const top3Foods = allSortedFoods.slice(0, 3);

      // Top 3 렌더링
      document.getElementById('top3-list').innerHTML = top3Foods.map((food, i) => {
        const reasonsHTML = (food.reasons || []).map(r => {
          const isPrice = r['사유'].includes('가격') || r['사유'].includes('가성비');
          const barColor = isPrice ? '#0d6efd' : '#198754'; 
          const textStyle = isPrice ? 'text-primary fw-bold' : 'text-muted';
          
          return `
          <div class="d-flex align-items-center gap-2 mb-2">
            <div style="height:8px;border-radius:4px;background:${barColor};width:${Math.min(r['점수']*2,200)}px;min-width:20px;"></div>
            <span class="small ${textStyle}">${r['사유']} <span style="font-size:0.75rem; opacity:0.8;">(+${r['점수']}점)</span></span>
          </div>`;
        }).join('');

        return `
          <div class="bg-white p-4 mb-4 rounded shadow-sm" style="border-left:6px solid ${i===0?'#20c997':'#dee2e6'};">
            <div class="row align-items-center">
              <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
                  <strong style="font-size:1.15rem;">${rankEmoji[i]} ${food.name}</strong>
                  <span class="badge" style="background:#198754;padding:6px 14px;font-size:0.9rem;">최종 적합도 ${food.score}점</span>
                </div>
                <p class="text-muted small mb-3">
                  💰 ${food.price.toLocaleString()}원
                  ${food.has_joint_supp ? ' | 🦴 관절 케어' : ''}
                  ${food.has_heart_supp ? ' | ❤️ 심장 케어' : ''}
                  ${food.has_kidney_supp ? ' | 💧 신장 케어' : ''}
                  ${food.has_allergy_supp ? ' | 🌿 알레르기 케어' : ''}
                  ${food.has_hormone_supp ? ' | ⚖️ 호르몬/대사 케어' : ''}
                  ${food.has_tumor_supp ? ' | 🛡️ 종양/면역 케어' : ''}
                  | 단백질: ${proteinLabel[food.protein]||'일반'}
                </p>
                ${reasonsHTML ? `<div class="mt-3 p-3 rounded" style="background:#f8fffe;border:1px solid #d1f5eb;">
                  <div class="fw-bold small text-secondary mb-2">⚖️ 상세 채점 내역</div>${reasonsHTML}</div>` : ''}
              </div>
              <div class="col-md-5 text-center mt-4 mt-md-0">
                <div style="position: relative; height: 190px; width: 100%; display: flex; justify-content: center;">
                  <canvas id="radarChart-${i}"></canvas>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      // Top 3 레이더 차트 그리기 (데이터 스케일링 패치)
      setTimeout(() => {
        top3Foods.forEach((food, i) => {
          const ctx = document.getElementById(`radarChart-${i}`);
          if (!ctx) return;

          let statHealth = 10, statBody = 10, statSize = 10, statPrice = 10, statExtra = 10;

          food.reasons.forEach(r => {
            const txt = r['사유'];
            const pts = r['점수'];
            if(txt.includes('케어')||txt.includes('질환')||txt.includes('특화')) statHealth += pts;
            else if(txt.includes('체형')||txt.includes('유지')||txt.includes('비만')) statBody += pts;
            else if(txt.includes('크기')||txt.includes('알갱이')||txt.includes('키블')) statSize += pts;
            else if(txt.includes('가격')||txt.includes('가성비')) statPrice += pts;
            else statExtra += pts;
          });

          // [핵심 시각화 패치] 제곱근을 활용하여 극단적인 점수차를 예쁜 비율로 압축
          const scale = v => Math.sqrt(v) * 10;

          new Chart(ctx, {
            type: 'radar',
            data: {
              labels: ['🏥 건강/질환', '🐕 체형/연령', '🦴 급여 편의', '💰 가성비', '🥩 영양 밸런스'],
              datasets: [{
                data: [scale(statHealth), scale(statBody), scale(statSize), scale(statPrice), scale(statExtra)],
                backgroundColor: 'rgba(32, 201, 151, 0.35)',
                borderColor: 'rgba(32, 201, 151, 1)',
                pointBackgroundColor: 'rgba(32, 201, 151, 1)',
                borderWidth: 2,
                pointRadius: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: { 
                r: { 
                  min: 0, 
                  max: 160, // 최대 예상 점수(약 250점)의 제곱근*10 = 158 -> 160으로 축 고정!
                  ticks: { display: false }, 
                  pointLabels: { font: { size: 10, weight: 'bold' }, color: '#495057' } 
                } 
              },
              plugins: { legend: { display: false } }
            }
          });
        });
      }, 100);

      // 전체 목록 페이징 초기화 및 렌더링 호출
      document.getElementById('all-list-card').classList.remove('d-none');
      currentPage = 1;
      renderPaginatedList();
    }

    // 페이징 렌더링 함수
    function renderPaginatedList() {
      const listContainer = document.getElementById('all-foods-list');
      const pageControls = document.getElementById('pagination-controls');

      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const paginatedItems = allSortedFoods.slice(startIndex, endIndex);

      listContainer.innerHTML = paginatedItems.map((food, index) => {
        const globalRank = startIndex + index + 1;
        
        // 가성비 점수 추출
        const priceReason = food.reasons.find(r => r['사유'].includes('가성비'));
        const priceScore = priceReason ? priceReason['점수'] : 0;

        return `
        <div class="d-flex justify-content-between align-items-center p-3 mb-2 border rounded" style="background-color: #f8f9fa;">
            <div>
                <strong style="font-size:1.05rem; color: #495057;">${globalRank}위. ${food.name}</strong>
                <div class="text-muted small mt-1">
                    💰 ${food.price.toLocaleString()}원
                </div>
            </div>
            <div class="text-end">
                <span class="badge" style="background-color:#6c757d; font-size:0.9rem;">총 적합도 ${food.score}점</span>
            </div>
        </div>`;
      }).join('');

      // 페이징 버튼 생성
      const totalPages = Math.ceil(allSortedFoods.length / itemsPerPage);
      let paginationHTML = '';
      
      for(let i = 1; i <= totalPages; i++) {
        paginationHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a></li>`;
      }
      pageControls.innerHTML = paginationHTML;
    }

    // 페이지 이동 함수
    function changePage(page) {
      currentPage = page;
      renderPaginatedList();
    }
  </script>
</body>
</html>

```
